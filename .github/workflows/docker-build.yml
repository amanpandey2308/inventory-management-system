# ============================================
# GitHub Actions — Build & Push Docker Images
# ============================================
# This workflow automatically builds Docker images for
# both backend and frontend, then pushes them to Docker Hub.
#
# Triggers on:
#   - Push to main branch
#   - Manual trigger (workflow_dispatch)
#
# Prerequisites:
#   Add these secrets in GitHub repo → Settings → Secrets → Actions:
#   - DOCKERHUB_USERNAME: Your Docker Hub username
#   - DOCKERHUB_TOKEN: Your Docker Hub access token (NOT password)

name: Build & Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  # ---- Build & Push Backend Image ----
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/inventory-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/inventory-backend:${{ github.sha }}

  # ---- Build & Push Frontend Image ----
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=http://localhost:8000
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/inventory-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/inventory-frontend:${{ github.sha }}
