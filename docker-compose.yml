# ============================================
# Docker Compose — Inventory Management System
# This file orchestrates 3 services:
#   1. postgres  — PostgreSQL database
#   2. backend   — FastAPI Python backend
#   3. frontend  — React + Nginx frontend
# ============================================
# Usage:
#   docker-compose up --build        (start all services)
#   docker-compose down              (stop all services)
#   docker-compose down -v           (stop + delete database data)
# ============================================

version: "3.8"

services:
  # ---- PostgreSQL Database ----
  postgres:
    image: postgres:15-alpine
    container_name: ims_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-inventory_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- FastAPI Backend ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ims_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/inventory_db}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  # ---- React Frontend (served by Nginx) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: ims_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

# Named volume for PostgreSQL data persistence
# Data survives container restarts and rebuilds
volumes:
  postgres_data:
